name: Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render (scores)
        run: |
          for i in {1..5}; do
            curl -s --max-time 30 https://portfolio-wivy.onrender.com/api/scores?mode=easy && break
            echo "Retry scores $i/5..."
            sleep 5
          done || true
      - name: Ping Render (weather)
        run: |
          for i in {1..5}; do
            curl -s --max-time 30 https://portfolio-wivy.onrender.com/api/weather && break
            echo "Retry weather $i/5..."
            sleep 5
          done || true
