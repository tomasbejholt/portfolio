name: Keep Alive

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render (scores – wakes Render + queries Supabase)
        run: curl -sf https://portfolio-wivy.onrender.com/api/scores?mode=easy
      - name: Ping Render (weather – exercises SMHI cache)
        run: curl -sf https://portfolio-wivy.onrender.com/api/weather
