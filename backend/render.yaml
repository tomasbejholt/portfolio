# Render.com deploy-konfiguration
# Lägg denna fil i roten av ditt repo (eller peka Render till backend/-mappen).

services:
  - type: web
    name: gotland-explorer-api
    env: python
    plan: free                          # Gratisplan på Render
    rootDir: backend                    # Mapp relativt repo-roten
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
